<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <style>
      .logo-text { font-family: 'Arial', 'Helvetica', sans-serif; font-weight: bold; font-size: 10px; }
    </style>
  </defs>
  <!-- Light purple background circle -->
  <circle cx="16" cy="16" r="16" fill="#E6D5F7"/>
  
  <!-- ESDO text -->
  <text x="16" y="20" class="logo-text" fill="#6B46C1" text-anchor="middle" letter-spacing="0.3">ESDO</text>
  
  <!-- White cross inside the O -->
  <g transform="translate(16, 20)">
    <line x1="1.8" y1="-1.8" x2="-1.8" y2="1.8" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="-1.8" y1="-1.8" x2="1.8" y2="1.8" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
  </g>
</svg>